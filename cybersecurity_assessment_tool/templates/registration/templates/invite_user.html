<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f5fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            width: 100%;
            max-width: 440px;
        }
        h1 {
            font-size: 1.7rem;
            margin-bottom: 0.25rem;
            color: #111827;
        }
        p.sub {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 1.75rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.35rem;
        }
        input {
            width: 100%;
            padding: 0.65rem 0.8rem;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 0.95rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.4);
        }
        .row {
            display: flex;
            gap: 0.75rem;
        }
        .row .field {
            flex: 1;
        }
        button {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.75rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #fff;
            font-weight: 600;
            font-size: 0.98rem;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(79, 70, 229, 0.4);
        }
        button:active {
            transform: translateY(0);
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.35);
        }
        .hint {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Create your account</h1>
    <p class="sub">Tell us a bit about you and your company.</p>

    <form method="POST" action="/signup">
        <!-- If using Django, add: {% csrf_token %} -->

        <div class="row">
            <div class="field">
                <label for="first_name">First name</label>
                <input id="first_name" name="first_name" type="text" required placeholder="Jane">
            </div>
            <div class="field">
                <label for="last_name">Last name</label>
                <input id="last_name" name="last_name" type="text" required placeholder="Doe">
            </div>
        </div>

        <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required placeholder="jane.doe">
        </div>

        <div class="field">
            <label for="company">Company</label>
            <input id="company" name="company" type="text" required placeholder="Acme Corp">
        </div>

        <div class="field">
            <label for="email">Work email</label>
            <input id="email" name="email" type="email" required placeholder="jane.doe@company.com">
        </div>

        <button type="submit">Sign up</button>

        <p class="hint">
            By continuing you agree to our terms and privacy policy.
        </p>
    </form>
</div>
</body>
</html>

<!-- old scan page -->

{% extends 'base.html' %}

{% block title %}Scan - {{ block.super }}{% endblock %}

{% block content %}
{% csrf_token %}
<div class="text-center py-2">
    <div class="col-lg py-3">
        <div class="card bg-light" style="min-height: 300px;">
            <div class="card-body d-flex justify-content-center flex-column align-items-center">
                <p class="lead text-muted">Scan Area</p>
                
                <div class="mb-3">
                    <button id="generateBtn" class="btn btn-primary btn-lg" onclick="startScan()">
                        Generate AI Report
                    </button>
                </div>
                
                <div id="statusContainer" class="mt-3 d-none">
                    <div class="spinner-border text-primary mb-2" role="status" id="loadingSpinner">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 id="statusText" class="text-primary">Initializing scan...</h5>
                </div>

            </div>
        </div>
    </div>
    
    <div class="col-lg py-3">
        <div class="card bg-light" style="height: 500px;">
            <div class="card-body">
                <h4>Recent Reports</h4>
                </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Check for pending tasks on page load
    document.addEventListener('DOMContentLoaded', function() {
        const savedTaskId = localStorage.getItem('activeReportTaskId');
        
        if (savedTaskId) {
            // Restore the loading UI
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('statusContainer').classList.remove('d-none');
            const statusText = document.getElementById('statusText');
            statusText.innerText = "Resuming scan progress...";
            statusText.className = "text-primary";
            document.getElementById('loadingSpinner').classList.remove('d-none');
            
            // Resume polling with the saved ID
            pollTaskStatus(savedTaskId);
        }
    });

    function startScan() {
        const btn = document.getElementById('generateBtn');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('loadingSpinner');
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

        // UI Updates
        btn.disabled = true;
        statusContainer.classList.remove('d-none');
        statusText.innerText = "Submitting task to background worker...";
        statusText.className = "text-primary";
        spinner.classList.remove('d-none');

        // Trigger the task
        fetch("{% url 'trigger_report' %}", {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrfToken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({})
        })
        .then(response => response.json())
        .then(data => {
            if (data.task_id) {
                // Save the task to local storage
                localStorage.setItem('activeReportTaskId', data.task_id);
                pollTaskStatus(data.task_id);
            } else {
                showError("Failed to get task ID from server.");
            }
        })
        .catch(error => showError("Network error occurred."));
    }

    function pollTaskStatus(taskId) {
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('loadingSpinner');
        const btn = document.getElementById('generateBtn');

        fetch(`/tasks/${taskId}/`)
            .then(response => response.json())
            .then(data => {
                if (data.state === 'SUCCESS') {
                    // Clear local storage on success
                    localStorage.removeItem('activeReportTaskId');
                    
                    spinner.classList.add('d-none');
                    statusText.className = "text-success";
                    statusText.innerText = data.result.message || "Report generated successfully!";
                    
                    setTimeout(() => window.location.reload(), 2000);

                } else if (data.state === 'FAILURE') {
                    showError(data.error || "Task failed to process.");
                } else {
                    // Task is PENDING or PROGRESS.
                    // Fallback to a generic message since Q2 doesn't natively stream steps
                    statusText.innerText = "Processing in background... this may take a minute.";
                    
                    // Keep polling
                    setTimeout(() => pollTaskStatus(taskId), 2000);
                }
            })
            .catch(error => showError("Error checking task status."));
    }

    function showError(message) {
        // Clear local storage on error so the user isn't stuck
        localStorage.removeItem('activeReportTaskId');
        
        document.getElementById('loadingSpinner').classList.add('d-none');
        const statusText = document.getElementById('statusText');
        statusText.className = "text-danger";
        statusText.innerText = message;
        document.getElementById('generateBtn').disabled = false;
    }
</script>
{% endblock %}

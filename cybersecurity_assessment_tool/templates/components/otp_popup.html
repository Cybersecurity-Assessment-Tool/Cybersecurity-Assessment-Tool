<!-- OTP Verification Modal -->
<!-- Usage: call openOtpModal({ email, login, onVerify, onResend, onSuccess, onCancel })
     
     Options:
       email      — string shown in the modal header (optional)
    login      — boolean; when true, mask the displayed email address
    onVerify   — function(otpCode, done) — make your AJAX call, then call:
                      done()              on success
                      done('error msg')   on failure
       onResend   — function(done) — make your AJAX call, then call:
                      done()              on success
                      done('error msg')   on failure
       onSuccess  — function() — called after success animation + modal close
       onCancel   — function() — called when modal is dismissed (optional)
-->
<div class="modal fade" id="otpModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Verify Your Email</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>We've sent a verification code to <strong id="otpEmailDisplay"></strong>.</p>

                <div class="mb-3">
                    <div id="otpBoxes" style="display: flex; gap: 8px; position: relative;">
                        <div class="otp-box" data-i="0"></div>
                        <div class="otp-box" data-i="1"></div>
                        <div class="otp-box" data-i="2"></div>
                        <div class="otp-box" data-i="3"></div>
                        <div class="otp-box" data-i="4"></div>
                        <div class="otp-box" data-i="5"></div>
                        <input type="text"
                               id="otpCode"
                               inputmode="numeric"
                               autocomplete="one-time-code"
                               maxlength="6"
                               style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: text; z-index: 2; font-size: 16px; border: none; background: transparent; outline: none;">
                    </div>
                </div>

                <div id="otpError" class="alert alert-danger mt-2" style="display: none;"></div>
                <div id="otpSuccess" class="alert alert-success mt-2" style="display: none;"></div>
                <div class="text-center mt-3">
                    <button type="button" class="btn btn-link" id="resendOtpBtn">Resend Code</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="verifyOtpBtn">Verify</button>
            </div>
        </div>
    </div>
</div>

<style>
    .otp-box {
        flex: 1;
        height: 56px;
        border: 1.5px solid #d1d5db;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 500;
        font-family: monospace;
        color: #111827;
        background: #f9fafb;
        transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        user-select: none;
    }
    .otp-box.active {
        border-color: #3b82f6;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }
    .otp-box.filled {
        border-color: #6b7280;
        background: #ffffff;
    }
    .otp-box.error {
        border-color: #ef4444;
        background: #fef2f2;
    }
    .otp-box .otp-cursor {
        display: inline-block;
        width: 1.5px;
        height: 26px;
        background: #3b82f6;
        border-radius: 1px;
        animation: otp-blink 1s step-end infinite;
    }
    @keyframes otp-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
</style>

<script>
(function() {
    // ── Internal box state ───────────────────────────────────────────────────
    var otpValue = '';
    var otpFocused = false;

    function maskEmail(email) {
        var value = (email || '').toString().trim();
        if (!value) return '';
        var atIndex = value.indexOf('@');
        /*
        // Uncessary with form validation ensuring valid email format, but there for pure safety in case of unexpected input. If no '@', just show first 3 chars and mask the rest.
        if (atIndex <= 0) {
            if (value.length <= 3) return value;
            return value.slice(0, 3) + '*'.repeat(value.length - 3);
        }*/

        var local = value.slice(0, atIndex);
        var domain = value.slice(atIndex);

        if (local.length <= 3) return local + domain;
        return local.slice(0, 3) + '*'.repeat(local.length - 3) + domain.slice(0, 5) + '*'.repeat(domain.length - 3);
    }

    function renderOtpBoxes() {
        document.querySelectorAll('.otp-box').forEach(function(box, i) {
            box.className = 'otp-box';
            box.innerHTML = '';
            if (otpValue[i] !== undefined) {
                box.textContent = otpValue[i];
                box.classList.add('filled');
            } else if (i === otpValue.length && otpFocused) {
                box.classList.add('active');
                var cur = document.createElement('span');
                cur.className = 'otp-cursor';
                box.appendChild(cur);
            }
        });
    }

    function resetOtp() {
        otpValue = '';
        document.getElementById('otpCode').value = '';
        renderOtpBoxes();
    }

    function setOtpError(message) {
        var el = document.getElementById('otpError');
        el.textContent = message;
        el.style.display = 'block';
        document.querySelectorAll('.otp-box').forEach(function(b) { b.classList.add('error'); });
    }

    function clearOtpError() {
        document.getElementById('otpError').style.display = 'none';
        document.querySelectorAll('.otp-box').forEach(function(b) { b.classList.remove('error'); });
    }

    // Wire up input once — handlers are permanent, only callbacks change per call
    document.getElementById('otpBoxes').addEventListener('click', function() {
        document.getElementById('otpCode').focus();
    });

    var otpCodeEl = document.getElementById('otpCode');

    otpCodeEl.addEventListener('input', function() {
        var raw = this.value.replace(/\D/g, '').slice(0, 6);
        this.value = raw;
        otpValue = raw;
        clearOtpError();
        renderOtpBoxes();
    });

    otpCodeEl.addEventListener('focus', function() { otpFocused = true; renderOtpBoxes(); });
    otpCodeEl.addEventListener('blur',  function() { otpFocused = false; renderOtpBoxes(); });

    otpCodeEl.addEventListener('keypress', function(e) {
        if (e.which === 13) document.getElementById('verifyOtpBtn').click();
    });

    // ── Public API ───────────────────────────────────────────────────────────
    // openOtpModal({ email, login, onVerify, onResend, onSuccess, onCancel })
    window.openOtpModal = function(options) {
        options = options || {};

        // Reset UI
        resetOtp();
        clearOtpError();
        document.getElementById('otpSuccess').style.display = 'none';
        document.getElementById('otpEmailDisplay').textContent = options.login ? maskEmail(options.email) : (options.email || '');

        // Clone buttons to cleanly detach any previous call's handlers
        var verifyBtn = document.getElementById('verifyOtpBtn');
        var resendBtn = document.getElementById('resendOtpBtn');
        var newVerify = verifyBtn.cloneNode(true);
        var newResend = resendBtn.cloneNode(true);
        verifyBtn.parentNode.replaceChild(newVerify, verifyBtn);
        resendBtn.parentNode.replaceChild(newResend, resendBtn);

        // Verify
        newVerify.addEventListener('click', function() {
            var code = document.getElementById('otpCode').value.trim();
            if (!/^\d{6}$/.test(code)) {
                setOtpError('Please enter a 6-digit code.');
                return;
            }

            newVerify.disabled = true;
            newVerify.textContent = 'Verifying...';

            if (options.onVerify) {
                options.onVerify(code, function(err) {
                    if (err) {
                        setOtpError(err);
                        newVerify.disabled = false;
                        newVerify.textContent = 'Verify';
                        resetOtp();
                        document.getElementById('otpCode').focus();
                    } else {
                        var successEl = document.getElementById('otpSuccess');
                        successEl.textContent = 'Email verified!';
                        successEl.style.display = 'block';
                        setTimeout(function() {
                            bootstrap.Modal.getInstance(document.getElementById('otpModal')).hide();
                            newVerify.disabled = false;
                            newVerify.textContent = 'Verify';
                            if (options.onSuccess) options.onSuccess();
                        }, 800);
                    }
                });
            }
        });

        // Resend
        newResend.addEventListener('click', function() {
            newResend.disabled = true;
            newResend.textContent = 'Sending...';

            if (options.onResend) {
                options.onResend(function(err) {
                    if (err) {
                        setOtpError(err);
                    } else {
                        var successEl = document.getElementById('otpSuccess');
                        successEl.textContent = 'New code sent!';
                        successEl.style.display = 'block';
                        setTimeout(function() { successEl.style.display = 'none'; }, 2500);
                        resetOtp();
                        document.getElementById('otpCode').focus();
                    }
                    newResend.disabled = false;
                    newResend.textContent = 'Resend Code';
                });
            }
        });

        // Cancel / dismiss
        var modalEl = document.getElementById('otpModal');
        var cancelHandler = function() {
            if (options.onCancel) options.onCancel();
            modalEl.removeEventListener('hidden.bs.modal', cancelHandler);
        };
        modalEl.addEventListener('hidden.bs.modal', cancelHandler);

        // Show
        bootstrap.Modal.getOrCreateInstance(modalEl).show();
        modalEl.addEventListener('shown.bs.modal', function handler() {
            document.getElementById('otpCode').focus();
            modalEl.removeEventListener('shown.bs.modal', handler);
        });
    };
})();
</script>

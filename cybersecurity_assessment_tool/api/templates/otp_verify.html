<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .otp-input { 
            width: 60px; height: 60px; 
            font-size: 24px; font-weight: bold; 
            text-align: center; 
            border: 2px solid #e1e5e9; 
            border-radius: 10px; 
            margin: 0 5px; 
            transition: all 0.3s;
        }
        .otp-input:focus { 
            border-color: #667eea; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: scale(1.05);
        }
        .otp-container { margin: 30px 0; }
        button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message { 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            font-weight: 500;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .resend { color: #667eea; cursor: pointer; text-decoration: underline; margin-top: 15px; }
        .resend:hover { color: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Verify OTP</h1>
        <p class="subtitle">Enter the 6-digit code sent to your email</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post" id="otpForm">
            {% csrf_token %}
            <div class="otp-container">
                <input type="text" name="otp1" class="otp-input" maxlength="1" autocomplete="one-time-code" required>
                <input type="text" name="otp2" class="otp-input" maxlength="1" required>
                <input type="text" name="otp3" class="otp-input" maxlength="1" required>
                <input type="text" name="otp4" class="otp-input" maxlength="1" required>
                <input type="text" name="otp5" class="otp-input" maxlength="1" required>
                <input type="text" name="otp6" class="otp-input" maxlength="1" required>
            </div>
            <button type="submit" id="verifyBtn">Verify OTP</button>
        </form>
        
        <div>
            <a href="{% url 'resend_otp' %}" class="resend">Didn't receive code? Resend OTP</a>
        </div>
    </div>

    <script>
        // Auto-focus next input
        document.querySelectorAll('.otp-input').forEach((input, index, arr) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < arr.length - 1) {
                    arr[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    arr[index - 1].focus();
                }
            });
        });
        
        // Submit on last input complete
        document.querySelector('.otp-input:last-child').addEventListener('input', () => {
            if (document.querySelector('.otp-input:last-child').value.length === 1) {
                document.getElementById('otpForm').submit();
            }
        });
    </script>
</body>
</html>
